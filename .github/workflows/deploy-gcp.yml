name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - gcp-ctrl-tower-deploy
  workflow_dispatch:

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  deploy:
    name: Build, Push, and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry Repository if missing
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          GAR_REPO: ${{ secrets.GAR_REPOSITORY || 'control-tower' }}
        run: |
          gcloud artifacts repositories describe $GAR_REPO --location=$REGION --project=$PROJECT_ID 2>/dev/null || \
          gcloud artifacts repositories create $GAR_REPO \
            --repository-format=docker \
            --location=$REGION \
            --project=$PROJECT_ID \
            --description="Docker repository for Agent Control Tower"

      - name: Build, tag, and push Docker image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          GAR_REPO: ${{ secrets.GAR_REPOSITORY || 'control-tower' }}
          SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME || 'control-tower-api' }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPO}/${SERVICE_NAME}:${IMAGE_TAG}"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.GCP_SERVICE_NAME || 'control-tower-api' }}
          region: ${{ secrets.GCP_REGION || 'us-central1' }}
          image: ${{ env.IMAGE_URI }}
          flags: |
            --allow-unauthenticated
            --port=3090
            --set-env-vars=CT_DB_PATH=/app/control-tower.db,NODE_ENV=production
