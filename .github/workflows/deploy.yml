name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'control-tower' }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Inject Execution Role ARN into Task Definition
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="${{ secrets.ECS_EXECUTION_ROLE_ARN }}"
          if [ -z "$ROLE_ARN" ]; then
            ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/service-role/ecsTaskExecutionRole"
          fi
          echo "Using Execution Role ARN: $ROLE_ARN"
          sed -i "s|<EXECUTION_ROLE_ARN>|$ROLE_ARN|g" .github/workflows/task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/workflows/task-definition.json
          container-name: control-tower-api
          image: ${{ steps.build-image.outputs.image }}

      - name: Ensure ECS Cluster and Service Exist
        env:
          CLUSTER_NAME: ${{ secrets.ECS_CLUSTER || 'control-tower-cluster' }}
          SERVICE_NAME: ${{ secrets.ECS_SERVICE || 'control-tower-service' }}
        run: |
          # 1. Ensure ECS Cluster exists
          echo "Checking if ECS Cluster '$CLUSTER_NAME' exists..."
          CLUSTER_STATUS=$(aws ecs describe-clusters --clusters "$CLUSTER_NAME" --query "clusters[0].status" --output text 2>/dev/null || echo "MISSING")
          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            echo "Cluster missing or inactive. Creating cluster '$CLUSTER_NAME'..."
            aws ecs create-cluster --cluster-name "$CLUSTER_NAME"
          else
            echo "Cluster '$CLUSTER_NAME' is active."
          fi

          # 2. Ensure CloudWatch Log Group exists
          echo "Creating Log Group '/ecs/control-tower-api' if it doesn't exist..."
          aws logs create-log-group --log-group-name "/ecs/control-tower-api" 2>/dev/null || echo "Log Group already exists or creation was skipped."

          # 3. Ensure ECS Service exists
          echo "Checking if ECS Service '$SERVICE_NAME' exists in cluster '$CLUSTER_NAME'..."
          SERVICE_STATUS=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query "services[0].status" --output text 2>/dev/null || echo "MISSING")
          if [ "$SERVICE_STATUS" != "ACTIVE" ] && [ "$SERVICE_STATUS" != "DRAINING" ]; then
            echo "Service '$SERVICE_NAME' is missing or inactive. Creating service..."
            
            # Get default VPC
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=is-default,Values=true" --query "Vpcs[0].VpcId" --output text)
            if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
              echo "Error: No default VPC found. Cannot automatically create service network configuration."
              exit 1
            fi
            echo "Using default VPC: $VPC_ID"
            
            # Get subnets of default VPC
            SUBNET_IDS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query "Subnets[*].SubnetId" --output json | jq -r 'join(",")')
            echo "Using default subnets: $SUBNET_IDS"
            
            # Get default security group
            SG_ID=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=default" --query "SecurityGroups[0].GroupId" --output text)
            echo "Using default security group: $SG_ID"
            
            # Register the rendered task definition
            echo "Registering task definition..."
            REGISTERED_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "file://${{ steps.render-task-def.outputs.task-definition }}" --query "taskDefinition.taskDefinitionArn" --output text)
            echo "Registered Task Definition ARN: $REGISTERED_TASK_ARN"
            
            echo "Creating ECS Service '$SERVICE_NAME'..."
            aws ecs create-service \
              --cluster "$CLUSTER_NAME" \
              --service-name "$SERVICE_NAME" \
              --task-definition "$REGISTERED_TASK_ARN" \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SG_ID],assignPublicIp=ENABLED}"
          else
            echo "Service '$SERVICE_NAME' exists and is active."
          fi

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE || 'control-tower-service' }}
          cluster: ${{ secrets.ECS_CLUSTER || 'control-tower-cluster' }}
          wait-for-service-stability: true
